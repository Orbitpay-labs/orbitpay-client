name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Build, test, and smoke check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Formatting check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test

      - name: Demo smoke test
        run: npm run demo:smoke
